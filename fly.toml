app = "movie-service-o7arxg"
primary_region = "jnb"

[env]
PORT = "8083"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8_083
min_machines_running = 0
processes = [ "app" ]

[[http_service.checks]]
grace_period = "30s"
interval = "15s"
timeout = "5s"
method = "GET"
path = "/api/health"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
# memory_mb = 256